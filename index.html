<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PL Legends Big Games Draw</title>

<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:Arial;
text-align:center;
}

header{
background:#000;
padding:25px;
border-bottom:3px solid gold;
}

h1{
color:gold;
margin:0;
}

textarea{
width:90%;
height:260px;
margin-top:20px;
background:#222;
color:#fff;
border:1px solid gold;
border-radius:10px;
padding:10px;
font-size:16px;
}

button{
margin:10px;
padding:14px 28px;
font-size:18px;
background:gold;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ffd700;
}

#results{
max-width:900px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
}

.match{
background:#222;
padding:18px;
border-radius:10px;
border:2px solid gold;
font-size:20px;
}

footer{
margin:30px;
color:#888;
}
</style>

</head>

<body>

<header>

<h1>🏆 PL LEGENDS BIG GAMES DRAW</h1>

<p>Wklej 24 finalistów (1 zawodnik = 1 linia)</p>

</header>

<textarea id="players"></textarea>

<br>

<button onclick="drawPairs()">🎲 LOSUJ PARY</button>

<button onclick="resetDraw()">🔄 RESET</button>

<div id="results"></div>

<footer>

PL Legends Draw

</footer>

<script>

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

}

function drawPairs(){

let text=document.getElementById("players").value;

let list=text.split("\n").map(x=>x.trim()).filter(x=>x!="");

if(list.length!=24){

alert("Musi być dokładnie 24 finalistów.");

return;

}

shuffle(list);

let html="";

for(let i=0;i<24;i+=2){

html+=`

<div class="match">

<b>MECZ ${(i/2)+1}</b>

<br><br>

${list[i]}

<br>

🆚

<br>

${list[i+1]}

</div>

`;

}

document.getElementById("results").innerHTML=html;

}

function resetDraw(){

document.getElementById("results").innerHTML="";

}

</script>

</body>
</html>
